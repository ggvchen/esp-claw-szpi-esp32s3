version: 1.0.0
# Peripherals Configuration for LCKFB SZPI ESP32-S3
#
# Official board docs:
# - Module: ESP32-S3-WROOM-1-N16R8, 16 MB Flash, 8 MB Octal PSRAM
# - Shared I2C bus: SDA=GPIO1, SCL=GPIO2
# - Audio I2S: MCLK=GPIO38, BCLK=GPIO14, WS=GPIO13, DIN=GPIO12
# - LCD backlight: GPIO42, active low through inverted LEDC output
# - TF card 1-bit SDMMC: CMD=GPIO48, CLK=GPIO47, D0=GPIO21
#
# NOTE: LCD SPI SCLK/MOSI/DC/RST are based on the public LCKFB tutorial's
# esp32_s3_szp BSP naming. If your hardware revision differs, adjust
# spi_display and display_lcd pins here.

peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 1
        scl: 2

  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s0_config
      port: 0
      sample_rate_hz: 16000
      clk_src: I2S_CLK_SRC_DEFAULT
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: 38
        bclk: 14
        ws: 13
        dout: 45
        din: 12

  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config: *i2s0_config

  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI2_HOST
        data0_io_num: 41
        sclk_io_num: 40
        max_transfer_sz: 153600

  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 42
      freq_hz: 5000
      duty: 0
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: true
