version: 1.0.0
# Devices Configuration for LCKFB SZPI ESP32-S3

devices:
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      dac_init_gain: 0
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 100000

  - name: audio_adc
    chip: es7210
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 4
      # Official LCKFB example records MIC1 and MIC2; MIC3 is wired to ES8311
      # output as an acoustic echo reference.
      adc_channel_mask: "0111"
      adc_channel_labels: ['REF', 'MIC2', 'MIC1', 'NA']
      adc_init_gain: 0
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x82
        frequency: 100000

  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: true
      mirror_y: false
      swap_xy: true
      invert_color: true
      x_max: 320
      y_max: 240
      io_spi_config:
        # LCD_CS is not a direct ESP32-S3 GPIO on this board. It is PCA9557 IO0.
        # setup_device.c drives that expander pin low before ST7789 init.
        cs_gpio_num: -1
        dc_gpio_num: 39
        spi_mode: 2
        pclk_hz: 80000000
      lcd_panel_config:
        reset_gpio_num: -1
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        flags:
          reset_active_high: false
        vendor_config: NULL
    peripherals:
      - name: spi_display

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  - name: lcd_touch
    chip: ft5x06
    type: lcd_touch
    sub_type: i2c
    version: default
    dependencies:
      esp_lcd_touch:
        version: "*"
        require: public
      espressif/esp_lcd_touch_ft5x06: "^1.0.0"
    config:
      io_i2c_config:
        lcd_cmd_bits: 8
        scl_speed_hz: 400000
      touch_config:
        # The LCKFB LVGL example swaps the screen axes, so the touch range is
        # x=LCD vertical resolution and y=LCD horizontal resolution.
        x_max: 240
        y_max: 320
        rst_gpio_num: -1
        int_gpio_num: -1
        levels:
          reset: 0
          interrupt: 0
        flags:
          swap_xy: true
          mirror_x: true
          mirror_y: false
    peripherals:
      - name: i2c_master
        # FT6336 / FT6x36 7-bit address is 0x38, board-manager uses 8-bit form.
        i2c_addr: [0x70]

  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: -1
        # DVP_PWDN is PCA9557 IO2, prepared in setup_device.c.
        pwdn_io: -1
        vsync_io: 3
        de_io: 46
        pclk_io: 7
        xclk_io: 5
        xclk_freq: 24000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 16
          data_io_1: 18
          data_io_2: 8
          data_io_3: 17
          data_io_4: 15
          data_io_5: 6
          data_io_6: 4
          data_io_7: 9
          data_io_8: -1
          data_io_9: -1
          data_io_10: -1
          data_io_11: -1
          data_io_12: -1
          data_io_13: -1
          data_io_14: -1
          data_io_15: -1
    peripherals:
      - name: i2c_master
        frequency: 100000

  - name: imu_sensor
    chip: qmi8658
    type: custom
    version: 1.0.0
    init_skip: true
    config:
      i2c_addr: 0x6A
      frequency: 100000
      int_gpio_num: -1
      sdo_gpio_num: -1
    peripherals:
      - name: i2c_master

  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    version: default
    config:
      sub_config:
        bus_width: 1
        pins:
          clk: 47
          cmd: 48
          d0: 21
          d1: -1
          d2: -1
          d3: -1
